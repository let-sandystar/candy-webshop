<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fed25-js1-uppgift-2-fed25-js1-inlamningsuppgift-2-grupp-2</title>
  </head>
  <body>
    <header class="sticky-top">
      <nav class="navbar navbar-dark bg-dark justify-content-center">
        <div>
          <img src="src/assets/images/logotype.png" alt="candyQueen logotype" class="navbar-logo img-fluid mb-2">
        </div>
         <div class="search-nav-wrapper"> 
            <form>
              <input id="search-bar" class="form-control-sm border-0 me-2" type="search" placeholder="Search product" aria-label="Search">
              <button class="btn btn-primary my-2 my-sm-0 me-2" type="submit" aria-label="shopping-cart"><i class="fa-solid fa-cart-shopping" style="color: #ffffff;"></i></button>
            </form>
          </div>
      </nav>
    </header>
    
    <section id="shopping-cart" class="bg-dark">
      <div class="container">
                <div class="row">
                    <!--Varukorg-->
                    <div class="col-md-6">
                        <h3 id="shopping-cart-title">
                          Your shoppingcart <i class="fa-solid fa-cart-shopping" style="color: #ffffff;"></i>
                        </h3>
                          <div id="cart-items">
                            <div class="card bg-dark border-0 mb-3" style="max-width: 400px;">
                              <div class="row g-0">
                                <div class="col-3">
                                  <img src="src/assets/images/queen.png" class="img-fluid rounded" alt="picture of product">
                                </div>
                                  <div class="col-9">
                                    <div class="card-body">
                                      <h5 class="card-title">Name of product</h5>
                                        <p class="card-text">44kr</p>
                                          <div class="input-group" style="max-width: 100px;">
                                            <button id="minus-btn"  class="btn btn-secondary" type="button">-</button>
                                            <input type="text" class="form-control text-center" style="max-width: 50px;" value="1">
                                            <button id="plus-btn"  class="btn btn-secondary" type="button">+</button>
                                          </div>
                                    </div>
                                  </div>
                                </div>
                            </div>
                          </div>
                    </div>
                    <!--Formulär-->
                </div>
      </div>
    </section>
    <div id="app"></div>
    <!--Script till fontawesome-ikoner-->
    <script src="https://kit.fontawesome.com/d94559cafd.js" crossorigin="anonymous"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
