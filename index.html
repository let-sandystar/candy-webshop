<!doctype html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="https://fav.farm/%F0%9F%91%91"/>
  <title>fed25-js1-uppgift-2-fed25-js1-inlamningsuppgift-2-grupp-2</title>

</head>

<body>
  <header class="sticky-top">
    <nav class="navbar navbar-dark bg-dark justify-content-center">
      <div>
        <img src="src/assets/images/logotype.png" alt="candyQueen logotype" class="navbar-logo img-fluid mb-1">
      </div>
      <div class="search-nav-wrapper">
        <form>
          <input id="search-bar" class="search-input" type="search" placeholder="Sök produkt..." aria-label="Search">
          <button id="nav-cart-btn" class="btn btn-primary my-2 my-sm-0 me-2" type="button"
            aria-label="shopping cart button"><i class="fa-solid fa-cart-shopping" style="color: #ffffff;"></i>
          <span id="cart-counter">0</span>
          </button>
        </form>
      </div>
    </nav>
  </header>

  <section id="carousel">
    <div id="candy-carousel" class="carousel slide" data-ride="carousel">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img class="d-block w-100 img-fluid object-fit-contain" src="src/assets/images/godisreklam1.JPG" alt="advert for candy boxes">
        </div>
        <div class="carousel-item">
          <img class="d-block w-100 object-fit-contain" src="src/assets/images/godisreklam2.jpg" alt="advert for candy">
        </div>
        <div class="carousel-item">
          <img class="d-block w-100 object-fit-contain" src="src/assets/images/godisreklam3.5.JPG" alt="advert for candy">
        </div>
      </div>
    </div>
  </section>

  <section id="shopping-cart">
    <div class="container">
      <div class="row">

        <!--Varukorg-->
        <div class="col-md-6 mb-3 cart-section">
          <div class="card bg-dark text-center">
            <h3 id="shopping-cart-title">Din varukorg <i class="fa-solid fa-cart-shopping" style="color: #ffffff;"></i>
            </h3>

            <button id="close-cart" class="btn btn-link position-absolute top-0 end-0 m-2" aria-label="close cart button">
              <i class="fa-solid fa-x"></i>
            </button>


            <!--Titlar-->
            <div class="table-responsive">
              <table class="table table-dark text-center align-middle">
                <thead>
                  <tr>
                    <th>Produkt</th>
                    <th>Antal</th>
                    <th>Pris</th>
                    <th>Summa</th>
                    <th></th> <!--papperskorgen!🗑️-->
                  </tr>
                </thead>
                <tbody id="cart-items">
                </tbody>
                <tfoot>
                  <tr>
                    <td id="total-title" colspan="5" class="text-center fw-bold">
                      Totalt: <span id="cart-total"></span>
                    </td>
                  </tr>
                </tfoot>
              </table>
            </div>
            <button class="checkout-btn">
              Gå vidare till Kassan <i class="fa-regular fa-credit-card"></i>
            </button>
          </div>
        </div>

        <!--Formulär-->
        <div class="col-md-6 mb-3 checkout-section">
          <div class="Checkout card p-3">
            
            <button id="close-checkout" class="btn btn-link position-absolute top-0 end-0 m-2" aria-label="close checkout form button">
              <i class="fa-solid fa-x"></i>
            </button>

            <h2>Dina uppgifter</h2>
            <form id="checkoutForm" class="checkoutForm" autocomplete="off">
              <div class="form-row">
                <div class="form-group">
                  <label for="customer_first_name">Förnamn*</label>
                  <input type="text" id="customer_first_name" class="form-control" autocomplete="off" required>
                </div>
                
                <div class="form-group">
                  <label for="customer_last_name">Efternamn*</label>
                  <input type="text" id="customer_last_name" class="form-control" autocomplete="off" required>
                </div>
              </div>

              <label for="customer_address">Adress*</label>
              <input type="text" id="customer_address" class="form-control mb-2" autocomplete="off" required>
            
              <div class="form-row">
                <div class="form-group">
              <label for="customer_postcode">Postnummer*</label>
              <input type="text" id="customer_postcode" maxlength="6" class="form-control" autocomplete="off" required>
            </div>
            
            <div class="form-group">
              <label for="customer_city">Ort*</label>
              <input type="text" id="customer_city" class="form-control" autocomplete="off" required>
            </div>
          </div>

              <label for="customer_phone">Telefonnummer</label>
              <input type="text" id="customer_phone" class="form-control" mb-2 autocomplete="off">

              <label for="customer_email">E-mail*</label>
              <input type="email" id="customer_email" class="form-control" mb-2 autocomplete="off" required>

              <button type="submit" class="btn btn-primary w-100 mt-3">Slutför köp</button>
            </form>
          </div>
          <div id="message" class="mt-2"></div>
        </div>
      </div>
    </div>
  </section>

  <div id="order-container" class="d-none">Tack för beställning</div>

  <div id="count-product-container">
    <p id="count-product"></p>
  </div>

  <!--Modal-->
  <div id="product-list"></div>

  <div id="app"></div>
  <div class="modal fade" id="productModalEl" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title" id="productModalLabel"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
          <img id="modal-image" class="img-fluid mb-3" />
          <p id="modal-description"></p>
          <p id="modal-price" class="fw-bold"></p>
        </div>

      </div>
    </div>
  </div>

  <!--Footer-->
  <footer class="footer">

    <div class="footer-logo">
      <img src="src/assets/images/logotype.png" alt="Candy Queen Logo">
    </div>

    <div class="footer-columns">
      <div class="col-1">
        <h3>KONTAKT <i class="fa-regular fa-address-card"></i></h3>
        <a href="#">Om oss</a>
        <a href="#">Kundservice</a>
        <a href="mailto:hello@candyqueen.se">hello@candyqueen.se</a>
        <a href="#">Webshop</a>
      </div>

      <div class="col-2">
        <h3>NYHETSBREV <i class="fa-regular fa-envelope"></i></h3>
        <form>
          <label for="email">E-mail:</label>
          <input name="email" id="email" placeholder="dinmail@email.se" required type="email" autocomplete="off"/>
          <button type="submit">Registrera mig</button>
        </form>
      </div>

      <div class="col-3">
        <h3>FÖLJ OSS <i class="fa-regular fa-heart"></i></h3>
        <div class="so-me-icons">
          <a href="#"><i class="fa-brands fa-instagram"></i></a>
          <a href="#"><i class="fa-brands fa-facebook"></i></a>
          <a href="#"><i class="fa-brands fa-tiktok"></i></a>
        </div>
      </div>
    </div>

    <div class="footer-bottom">
      &copy; 2025 Candy Queen. Alla rättigheter förbehållna.
    </div>

  </footer>

  <!--Script till fontawesome-ikoner-->
  <script src="https://kit.fontawesome.com/d94559cafd.js" crossorigin="anonymous"></script>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
