<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <body>
    <header class="sticky-top">
      <nav class="navbar navbar-dark bg-dark justify-content-center">
        <div>
          <img src="src/assets/images/logotype.png" alt="candyQueen logotype" class="navbar-logo img-fluid mb-2">
        </div>
          <div class="search-nav-wrapper"> 
            <form>
              <input id="search-bar" class="search-input" type="search" placeholder="Sök produkt..." aria-label="Search">
              <button class="btn btn-primary my-2 my-sm-0 me-2" type="submit" aria-label="shopping-cart"><i class="fa-solid fa-cart-shopping" style="color: #ffffff;"></i></button>
            </form>
          </div>
      </nav>
    </header>
    
    <section id="shopping-cart">
      <div class="container">
        <div class="row">

      <!--Varukorg-->
      <div class="col-md-6 mb-3">
        <div class="card bg-dark text-center">
        <h3 id="shopping-cart-title">Din varukorg <i class="fa-solid fa-cart-shopping" style="color: #ffffff;"></i></h3>
            <!--Titlar-->
            <div class="table-responsive">
                <table class="table table-dark text-center align-middle">
                    <thead>
                        <tr>
                        <th>Produkt</th>
                        <th>Antal</th>
                        <th>Pris</th>
                        <th>Summa</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items">
                    </tbody>
                    <tfoot>
                        <tr>
                            <td class="text-end fw-bold">Totalt:</td>
                            <td id="cart-total"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
      </div>
        <!--Formulär-->
            <div class="col-md-6 mb-3">
                <div class="Checkout card p-3 d-none">
                    <h2>Till kassan <i class="fa-regular fa-credit-card"></i></h2>
                    <form id="checkoutForm" class="checkoutForm">
                    <label for="name">Namn*</label>
                    <input type="text" id="name" class="form-control mb-2" required>
                    
                    <label for="address">Adress*</label>
                    <input type="text" id="address" class="form-control mb-2" required>
                    
                    <label for="zipcode">Postnummer*</label>
                    <input type="text" id="zipcode" maxlength="6" class="form-control mb-2" required>
                    
                    <label for="city">Ort*</label>
                    <input type="text" id="city" class="form-control mb-2" required>
                    
                    <label for="phone">Telefonnummer</label>
                    <input type="text" id="phone" class="form-control mb-2">
                    
                    <label for="email">E-mail*</label>
                    <input type="email" id="email" class="form-control mb-2" required>
                    
                    <button type="submit" class="btn btn-primary w-100 mt-3">Slutför köp</button>
                    </form>
                    </div>
                    <div id="message" class="mt-2"></div>
                    </div>
                    </div>
                </div>
        </section>

    <div id="product-list"></div>

    <div id="app"></div>

      <footer class="footer">

  <div class="footer-logo">
    <img src="src/assets/images/logotype.png" alt="Candy Queen Logo">
  </div>

  <div class="footer-columns">
    <div class="col-1">
      <h3>KONTAKT <i class="fa-regular fa-address-card"></i></h3>

      <a href="#">Kundservice</a>
      <a href="mailto:hello@candyqueen.se">hello@candyqueen.se</a>
      <a href="#">Webshop</a>
    </div>

    <div class="col-2">
      <h3>NYHETSBREV <i class="fa-regular fa-envelope"></i></h3>
      <form>
        <input type="email" placeholder="Din e-mail..." required>
        <button type="submit">Registrera mig</button>
      </form>
  </div>
  
  <div class="col-3">
